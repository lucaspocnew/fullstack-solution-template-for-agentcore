stack_name_base: FAST-stack

# Optional: Set to automatically create an admin user and email credentials
# If not provided, you'll need to manually create users via AWS Console
admin_user_email: # Example: admin@example.com

backend:
  agent_name: FASTAgent # Name for the agent runtime (a-z, A-Z, 0-9, _)
  pattern: strands-single-agent # See patterns/ for available options
  # Pattern prefix determines the frontend parser:
  #   agui-*      → AG-UI parser      (e.g. agui-strands-agent)
  #   strands-*   → Strands parser    (e.g. strands-single-agent)
  #   langgraph-* → LangGraph parser  (e.g. langgraph-single-agent)
  #   claude-*    → Claude parser     (e.g. claude-agent-sdk-single-agent)
  # The folder name must match exactly and start with the desired parser prefix.
  deployment_type: docker # Available deployment types: docker (default), zip (not supported for claude-agent-sdk)
  network_mode: PUBLIC # Available network modes: PUBLIC (default), VPC

  # Long-term memory uses a SemanticMemoryStrategy to extract and store facts across sessions.
  # This incurs additional costs: $0.75/1,000 records stored + $0.50/1,000 retrieval calls.
  # Set to true when you want to try persistent cross-session memory, which is keyed off of the
  # Cognito userId.
  use_long_term_memory: false
  ltm_top_k: 10             # Number of facts to retrieve per turn (default: 10)
  ltm_relevance_score: 0.3  # Minimum similarity threshold for retrieval (default: 0.3)

  # VPC configuration - required when network_mode is VPC
  # Your VPC must have the necessary VPC endpoints for AWS services.
  # See docs/DEPLOYMENT.md for the full list of required VPC endpoints.
  # vpc:
  #   vpc_id: vpc-0abc1234def56789a
  #   subnet_ids:
  #     - subnet-aaaa1111bbbb2222c
  #     - subnet-cccc3333dddd4444e
  #   security_group_ids:  # Optional - a default SG is created if omitted
  #     - sg-0abc1234def56789a
